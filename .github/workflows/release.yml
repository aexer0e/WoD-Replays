name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "VERSION must be a semver value like 1.2.3 or 1.2.3-beta.1. Received: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Sync app metadata
        run: npm run sync-version

      - name: Check release tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -eq 0 -and $remoteTag) {
            $headSha = git rev-parse HEAD
            $tagSha = ($remoteTag -split "\s+")[0]
            if ($tagSha -ne $headSha) {
              throw "Release tag $tag already exists on a different commit. Bump VERSION before releasing again."
            }
          }

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: WoD Replays ${{ steps.version.outputs.tag }}
          releaseBody: Windows installers for WoD Replays ${{ steps.version.outputs.tag }}.
          releaseDraft: false
          prerelease: false
